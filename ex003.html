<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
</head>

<body>
    <style>
        .rg-box {

            width: 530px;
            height: 300px;
            border: 2px solid black;
            border-radius: 10px;
            padding: 20px;
            background-color: brown;


        }

        .title {
            text-align: center;
            border-bottom: 2px solid black;

        }

        .info {
            background-color: aliceblue;
            width: 100%;
            border: 2px solid black;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .foto-rg {
            width: 80px;
            height: 100px;
            border: 2px solid #000;
            float: left;
            margin-right: 15px;
            background-color: #ccc;
        }

        .info p {
            text-align: right;
            /* Mantém seu texto alinhado à direita */
            margin: 5px;
        }

        .links {
            text-align: center;
            font-size: 50px;
            background-color: beige;
        }
    </style>
    <div class="rg-box">

        <div class="title">
            <p>REPUBLICA FEDERATIVA DO BRASIL</p>
            <P>ESTADO DE GOIAS</P>
        </div>


        <div class="info">
            <img class="foto-rg" src="img/foto.jpg" alt="Foto">

            <p>RG: 6768895</p>
            <p>CPF: 062.533.791-35</p>
            <p>Nascimento: 04/04/2007</p>
            <p>Matricula: R199567</p>
        </div>




</body>

</html>
